openapi: 3.0.0
info:
  title: E-Commerce Inventory API
  version: 1.0.0
  description: API endpoints for managing physical stock, stock reservations, and inventory audit logs.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /api/inventory/availability/{productId}:
    get:
      summary: Get available stock for a product
      description: Returns the physical stock minus any active reservations.
      tags:
        - Inventory
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Stock availability retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  productId:
                    type: string
                  physicalStock:
                    type: integer
                  activeReservations:
                    type: integer
                  availableStock:
                    type: integer

  /api/inventory/reservations:
    post:
      summary: Create a temporary stock reservation
      description: Reserves a specified quantity of a product for a short period (e.g., 15 minutes).
      tags:
        - Inventory
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - productId
                - quantity
              properties:
                productId:
                  type: string
                quantity:
                  type: integer
                  minimum: 1
      responses:
        '201':
          description: Reservation created successfully
        '409':
          description: Conflict - Insufficient available stock

  /api/inventory/reservations/{id}/commit:
    post:
      summary: Commit a stock reservation
      description: Permanently deducts the reserved physical stock and marks the reservation as COMMITTED.
      tags:
        - Inventory
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Reservation committed successfully
        '409':
          description: Conflict - Reservation is expired or already committed

  /api/inventory/adjustments:
    post:
      summary: Create a manual stock adjustment
      description: Allows Admins to add or remove physical stock (with a reason).
      tags:
        - Inventory
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - productId
                - quantityChange
                - reason
              properties:
                productId:
                  type: string
                quantityChange:
                  type: integer
                  description: "Positive to add stock, negative to remove stock."
                reason:
                  type: string
                  example: "RESTOCK"
      responses:
        '201':
          description: Stock adjusted successfully
        '400':
          description: Bad Request - Negative adjustment exceeds available stock
        '403':
          description: Forbidden - Admin role required
